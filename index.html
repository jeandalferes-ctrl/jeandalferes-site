<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDR</title>
<link rel="icon" href="/favicon.png" type="image/png">
<meta name="description" content="Coming soon.">
<style>
  :root {
    --ground: #14110F;
    --parchment: #F5F0EB;
    --accent: #9C7A4A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--ground); color: var(--parchment); font-family: 'Georgia', 'Iowan Old Style', 'Palatino Linotype', serif; }
  body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
  .mark { font-size: clamp(3rem, 10vw, 6rem); letter-spacing: 0.15em; font-weight: 400; margin-bottom: 1rem; }
  .sub { font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
</style>
</head>
<body>
  <div class="mark">JDR</div>
  <div class="sub">Coming Soon</div>
</body>
</html>
