<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jean Dalferes Robicheaux</title>
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:title" content="Jean Dalferes Robicheaux">
<meta property="og:description" content="I travel with intention and stay where it's interesting.">
<meta property="og:image" content="/og-image.png">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root {
    --ground: #14110F;
    --parchment: #F5F0EB;
    --accent: #9C7A4A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--ground);
    color: var(--parchment);
    font-family: 'Georgia', 'Iowan Old Style', 'Palatino Linotype', serif;
  }
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 6vh 8vw;
    text-align: center;
  }
  .name {
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-bottom: 1.2rem;
  }
  .tagline {
    font-size: clamp(1rem, 2.4vw, 1.3rem);
    font-style: italic;
    color: var(--accent);
    margin-bottom: 2.4rem;
    max-width: 32rem;
    line-height: 1.5;
  }
  .positioning {
    font-size: clamp(0.9rem, 1.8vw, 1.05rem);
    line-height: 1.7;
    color: #C9C2B8;
    max-width: 34rem;
    margin-bottom: 3.2rem;
  }
  .links {
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .links a {
    color: var(--parchment);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid transparent;
    padding-bottom: 0.3rem;
    transition: border-color 0.25s ease, color 0.25s ease;
  }
  .links a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  footer {
    position: absolute;
    bottom: 2.5vh;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    color: #55504A;
  }
</style>
</head>
<body>
  <div class="name">Jean Dalferes Robicheaux</div>
  <div class="tagline">&ldquo;I travel with intention and stay where it&rsquo;s interesting.&rdquo;</div>
  <p class="positioning">
    Patent attorney. AI governance and infrastructure builder. Nomadic by design &mdash;
    moving between the ocean, the work, and the work of becoming.
  </p>
  <div class="links">
    <a href="/course/">Course</a>
    <a href="/kit/">Kit</a>
    <a href="/about/">About</a>
    <a href="#" aria-label="Contact">Contact</a>
  </div>
  <footer>&copy; 2026 Jean Dalferes Robicheaux</footer>
</body>
</html>
