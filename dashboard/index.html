<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Jean Dalferes Robicheaux</title>
<meta name="description" content="Operational dashboard — private.">
<style>
  :root { --ground: #14110F; --parchment: #F5F0EB; --accent: #9C7A4A; --footer-text: #55504A; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--ground); color: var(--parchment); font-family: 'Georgia', 'Iowan Old Style', 'Palatino Linotype', serif; }
  body { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 6vh 8vw; }
  .headline { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 400; letter-spacing: 0.02em; margin-bottom: 0.8rem; color: var(--accent); }
  .sub { font-size: 0.95rem; color: #C9C2B8; }
  nav { margin-top: 3rem; }
  nav a { color: var(--parchment); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid transparent; padding-bottom: 0.25rem; }
  nav a:hover { color: var(--accent); border-color: var(--accent); }
  footer { position: absolute; bottom: 2.5vh; font-size: 0.7rem; letter-spacing: 0.05em; color: var(--footer-text); }
</style>
</head>
<body>
  <div class="headline">Operational Dashboard</div>
  <div class="sub">Private.</div>
  <nav><a href="/">&larr; Home</a></nav>
  <footer>&copy; 2026 Jean Dalferes Robicheaux</footer>
</body>
</html>
